name: Aegis Risk Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  risk-analysis:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          DIFF_SIZE=$(wc -c < pr.diff)
          echo "size=$DIFF_SIZE" >> $GITHUB_OUTPUT
          # Cap diff at 500KB to avoid API limits
          head -c 500000 pr.diff > pr-trimmed.diff
          mv pr-trimmed.diff pr.diff

      - name: Call Aegis API
        id: aegis
        if: env.AEGIS_API_URL != ''
        continue-on-error: true
        env:
          AEGIS_API_URL: ${{ secrets.AEGIS_API_URL }}
        run: |
          DIFF=$(cat pr.diff)
          BODY=$(cat <<'PAYLOAD'
          {
            "diff": "$DIFF",
            "repo_url": "${{ github.repository }}",
            "pr_url": "${{ github.event.pull_request.html_url }}",
            "context": "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          }
          PAYLOAD
          )
          
          curl -s -X POST "$AEGIS_API_URL/api/v1/simulate/change" \
            -H "Content-Type: application/json" \
            -d "$BODY" > result.json
          
          cat result.json
          RISK=$(jq -r '.data.risk_score // "Unknown"' result.json 2>/dev/null || echo "Unknown")
          echo "risk=$RISK" >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: steps.aegis.outcome == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let data = null;
            try {
              const content = fs.readFileSync('result.json', 'utf8');
              const result = JSON.parse(content);
              data = result.data;
            } catch (e) {
              console.log('Could not parse result:', e);
              return;
            }

            if (!data) return;

            const icons = {
              'Low': '🟢',
              'Medium': '🟡',
              'High': '🟠',
              'Critical': '🔴'
            };

            const icon = icons[data.risk_score] || '⚪';
            const body = `## ${icon} Aegis Twin — Risk Analysis

**Risk: ${data.risk_score}** · Confidence: ${Math.round(data.confidence * 100)}%

### Blast Radius
| Services | Endpoints | Databases |
|---|---|---|
| ${data.blast_radius?.services || 0} | ${data.blast_radius?.endpoints || 0} | ${data.blast_radius?.databases || 0} |

### Analysis
${data.explanation || 'No analysis available.'}

### Mitigations
${(data.mitigations || []).map((m, i) => \`\${i + 1}. \${m}\`).join('\n') || 'None'}

---
*Generated by [Aegis Twin](https://github.com/aegis-twin)*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Block on Critical
        if: steps.aegis.outputs.risk == 'Critical'
        run: |
          echo "::error::Aegis detected CRITICAL risk. Merge is blocked."
          exit 1

      - name: Set status check
        if: always() && steps.aegis.outcome == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const risk = '${{ steps.aegis.outputs.risk }}' || 'Unknown';
            const state = risk === 'Critical' ? 'failure' : risk === 'High' ? 'neutral' : 'success';
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Aegis Risk Check',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: state,
              output: {
                title: `Risk: ${risk}`,
                summary: `Aegis detected ${risk} risk level.`,
              }
            });
